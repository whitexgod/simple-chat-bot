services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - NBN_BASIC_AUTH_ACTIVE=true
      - NBN_BASIC_AUTH_USER=admin
      - NBN_BASIC_AUTH_PASSWORD=admin
      - NBN_SECURE_COOKIE=false
      - N8N_CORS_ALLOW_ORIGIN=*
    volumes:
      - n8n_data:/home/node/.n8n
    
volumes:
  n8n_data: